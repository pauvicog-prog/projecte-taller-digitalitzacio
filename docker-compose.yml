services:
  db:
    image: mariadb:11
    container_name: taller_db
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: taller
      MARIADB_USER: talleruser
      MARIADB_PASSWORD: tallerpass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db_schema.sql:/docker-entrypoint-initdb.d/db_schema.sql:ro
    networks:
      - taller_net

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: taller_api
    restart: always
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_USER: talleruser
      DB_PASSWORD: tallerpass
      DB_NAME: taller
    ports:
      - "5000:5000"
    networks:
      - taller_net

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: taller_web
    restart: always
    ports:
      - "8080:80"
    networks:
      - taller_net

volumes:
  db_data:

networks:
  taller_net:
    driver: bridge
